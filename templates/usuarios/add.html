{% extends "base.html" %}

{% block content %}
<div class="mb-3">
    <h2><i class="bi bi-person-plus-fill"></i> Agregar Usuario</h2>
</div>

<form method="POST" action="{{ url_for('usuarios.agregar_usuario') }}">
    <div class="card">
        <div class="card-body">
            <!-- Campo: Nombre -->
            <div class="mb-3">
                <label for="nombre" class="form-label">Nombre completo</label>
                <input type="text" class="form-control" id="nombre" name="nombre" placeholder="Ej: Juan Pérez" required>
            </div>

            <!-- Campo: Nombre de usuario -->
            <div class="mb-3">
                <label for="username" class="form-label">Nombre de usuario</label>
                <input type="text" class="form-control" id="username" name="username" placeholder="Ej: jperez" required>
            </div>

            <!-- Campo: Contraseña -->
            <div class="mb-3">
                <label for="password" class="form-label">Contraseña</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>

            <!-- Campo: Rol -->
            <div class="mb-3">
                <label for="rol" class="form-label">Rol</label>
                <select class="form-select" id="rol" name="rol" required>
                    <option value="" disabled selected>Seleccione un rol</option>
                    <option value="admin">Admin</option>
                    <option value="editor">Editor</option>
                    <option value="viewer">Viewer</option>
                </select>
            </div>
        </div>

        <div class="card-footer text-end">
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-save"></i> Crear Usuario
            </button>
            <a href="{{ url_for('usuarios.lista_usuarios') }}" class="btn btn-secondary">
                <i class="bi bi-x-circle"></i> Cancelar
            </a>
        </div>
    </div>
</form>
{% endblock %}
