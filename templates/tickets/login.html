{% extends "base.html" %}

{% block title %}Admin Tickets - Iniciar Sesión{% endblock %}

{% block content %}
<div class="login-container fade-in">
    <div class="login-card">
        <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Logo del Sistema" class="login-logo">
        <h3>Panel de Tickets</h3>
        <p class="text-muted small">Acceso exclusivo para administradores</p>
        <form method="post">
            <div class="mb-3 text-start">
                <label for="username" class="form-label">Usuario</label>
                <input type="text" id="username" name="username" class="form-control" required autofocus>
            </div>
            <div class="mb-3 text-start">
                <label for="password" class="form-label">Contraseña</label>
                <input type="password" id="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-box-arrow-in-right"></i> Ingresar
            </button>
        </form>
        <div class="mt-3">
            <a href="{{ url_for('tickets.tickets') }}" class="text-decoration-none small">
                <i class="bi bi-arrow-left-circle"></i> Volver a tickets
            </a>
        </div>
    </div>
</div>

<footer class="login-footer">
    <p>© {{ current_year }} — <strong>Sistema de Control Interno</strong></p>
</footer>
{% endblock %}
