<!-- 500.html -->
{% extends "base.html" %}

{% block title %}Error del servidor{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 text-center">
        <div class="card">
            <div class="card-body p-5">
                <i class="bi bi-x-circle text-danger" style="font-size: 5rem;"></i>
                <h1 class="display-4 mt-3">500</h1>
                <h3>Error del servidor</h3>
                <p class="text-muted mt-3">
                    Ha ocurrido un error inesperado. Por favor, intenta nuevamente más tarde.
                </p>
                <a href="{{ url_for('index') }}" class="btn btn-primary mt-3">
                    <i class="bi bi-house-fill"></i> Volver al inicio
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
